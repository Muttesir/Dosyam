<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1C18"/>
      <stop offset="100%" style="stop-color:#111009"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2BA5A"/>
      <stop offset="100%" style="stop-color:#B8922E"/>
    </linearGradient>
  </defs>

  <!-- Arka plan - yuvarlatılmış kare -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Süsleme halkası -->
  <circle cx="512" cy="420" r="310" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.15"/>

  <!-- Terazi direği (orta dikey çubuk) -->
  <rect x="499" y="220" width="26" height="420" rx="13" fill="url(#gold)"/>

  <!-- Üst yatay çubuk -->
  <rect x="260" y="220" width="504" height="24" rx="12" fill="url(#gold)"/>

  <!-- Sol ip -->
  <line x1="312" y1="244" x2="272" y2="390" stroke="#C9A84C" stroke-width="10" stroke-linecap="round"/>
  <!-- Sağ ip -->
  <line x1="712" y1="244" x2="752" y2="390" stroke="#C9A84C" stroke-width="10" stroke-linecap="round"/>

  <!-- Sol kefe -->
  <path d="M192 392 Q272 370 352 392 Q272 460 192 392Z" fill="url(#gold)" opacity="0.95"/>
  <path d="M192 392 Q272 414 352 392" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.6"/>

  <!-- Sağ kefe -->
  <path d="M632 392 Q712 370 792 392 Q712 460 632 392Z" fill="url(#gold)" opacity="0.95"/>
  <path d="M632 392 Q712 414 792 392" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.6"/>

  <!-- Alt taban -->
  <rect x="420" y="636" width="184" height="20" rx="10" fill="url(#gold)" opacity="0.7"/>
  <rect x="360" y="652" width="304" height="22" rx="11" fill="url(#gold)"/>

  <!-- Alt yazı -->
  <text
    x="512"
    y="790"
    text-anchor="middle"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="88"
    font-weight="800"
    letter-spacing="18"
    fill="url(#gold)"
  >DOSYAM</text>

  <!-- Alt ince çizgi dekorasyon -->
  <rect x="380" y="810" width="264" height="3" rx="1.5" fill="#C9A84C" opacity="0.4"/>
</svg>
